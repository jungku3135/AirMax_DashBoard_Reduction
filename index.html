<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" href="https://airmax.testonic.co.kr/favicon.ico" type="image/x-icon" sizes="16x16">
<title>AIRMAX 제품 점검</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#f4f4f5; --surface:#ffffff; --border:#e0e0e0; --border2:#ebebeb;
  --text:#111111; --text2:#555555; --text3:#999999; --text4:#bbbbbb;
  --input-bg:#fafafa; --tag-bg:#f0f0f0; --tag-border:#d8d8d8;
  --btn-bg:#111111; --btn-text:#ffffff; --log-bg:#fafafa; --summary-bg:#ffffff;
  --chip-def-border:#e0e0e0; --chip-def-text:#bbb; --chip-def-count:#ccc;
  --overlay-bg:rgba(244,244,245,0.92); --spinner-track:#ddd; --spinner-head:#555;
  --bar-bg:#e5e5e5; --bar-fg:#555; --tooltip-bg:#ffffff;
  --tooltip-border:#e0e0e0; --tooltip-text:#333;
  --ok-bg:#e8f8e8; --ok-border:#52b852; --ok-text:#1e6e1e;
  --ok-chip-bg:#e8f8e8; --ok-chip-border:#52b852; --ok-chip-text:#1e6e1e;
  --no-bg:#f0f0f0; --no-border:#888888; --no-text:#333333;
  --no-chip-bg:#f0f0f0; --no-chip-border:#888888; --no-chip-text:#333333;
  --em-bg:#e0efff; --em-border:#2979d4; --em-text:#1450a0;
  --em-chip-bg:#e0efff; --em-chip-border:#2979d4; --em-chip-text:#1450a0;
  --pm-bg:#fde8e8; --pm-border:#d43232; --pm-text:#9a1010;
  --pm-chip-bg:#fde8e8; --pm-chip-border:#d43232; --pm-chip-text:#9a1010;
  --err-bg:#fef8e0; --err-border:#c49a10; --err-text:#7a5c00;
  --err-chip-bg:#fef8e0; --err-chip-border:#c49a10; --err-chip-text:#7a5c00;
}
[data-theme="dark"] {
  --bg:#181818; --surface:#222222; --border:#333333; --border2:#2a2a2a;
  --text:#e8e8e8; --text2:#aaaaaa; --text3:#666666; --text4:#444444;
  --input-bg:#2a2a2a; --tag-bg:#2e2e2e; --tag-border:#3a3a3a;
  --btn-bg:#e8e8e8; --btn-text:#111111; --log-bg:#1a1a1a; --summary-bg:#1e1e1e;
  --chip-def-border:#383838; --chip-def-text:#555; --chip-def-count:#444;
  --overlay-bg:rgba(18,18,18,0.92); --spinner-track:#333; --spinner-head:#aaa;
  --bar-bg:#2e2e2e; --bar-fg:#888; --tooltip-bg:#2a2a2a;
  --tooltip-border:#3a3a3a; --tooltip-text:#ccc;
  --ok-bg:#0e2a0e; --ok-border:#3a9e3a; --ok-text:#6dd86d;
  --ok-chip-bg:#0e2a0e; --ok-chip-border:#3a9e3a; --ok-chip-text:#6dd86d;
  --no-bg:#2a2a2a; --no-border:#888888; --no-text:#cccccc;
  --no-chip-bg:#2a2a2a; --no-chip-border:#888888; --no-chip-text:#cccccc;
  --em-bg:#0c1e38; --em-border:#4a9de8; --em-text:#7dc4ff;
  --em-chip-bg:#0c1e38; --em-chip-border:#4a9de8; --em-chip-text:#7dc4ff;
  --pm-bg:#2e0c0c; --pm-border:#e84a4a; --pm-text:#ff8888;
  --pm-chip-bg:#2e0c0c; --pm-chip-border:#e84a4a; --pm-chip-text:#ff8888;
  --err-bg:#2a1e00; --err-border:#d4a820; --err-text:#ffd060;
  --err-chip-bg:#2a1e00; --err-chip-border:#d4a820; --err-chip-text:#ffd060;
}

body {
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
  min-height:100vh; padding-bottom:80px;
  transition:background 0.2s,color 0.2s;
}

.header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:16px 32px 13px; position:sticky; top:0; z-index:100;
  box-shadow:0 1px 6px rgba(0,0,0,0.06);
  display:flex; align-items:center; justify-content:space-between;
}
.header-top { display:flex; align-items:baseline; gap:12px; }
.logo { font-size:24px; font-weight:bold; letter-spacing:3px; color:var(--text); }
.subtitle { font-size:16px; font-weight:bold; color:var(--text2); }
.date-info { font-size:12px; font-weight:bold; color:var(--text3); margin-top:4px; }

.theme-toggle {
  background:var(--input-bg); border:1.5px solid var(--border);
  border-radius:20px; padding:6px 14px; font-size:12px; color:var(--text2);
  cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px;
  transition:all 0.15s; white-space:nowrap;
}
.theme-toggle:hover { border-color:var(--text3); color:var(--text); }
.theme-icon { font-size:14px; }

.card-location { font-size:12px; color:var(--text2); font-weight:600; margin-top:1px; }

/* 제품 설치 장소 편집 */
.product-editor-section {
  margin-top:10px; padding:14px; background:var(--input-bg);
  border:1.5px solid var(--border); border-radius:8px;
}
.pe-toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.pe-toolbar select, .pe-toolbar input[type=text] {
  background:var(--input-bg); border:1.5px solid var(--border); border-radius:6px;
  color:var(--text); padding:5px 10px; font-size:12px; outline:none; font-family:inherit;
}
.pe-toolbar select { min-width:140px; }
.pe-toolbar input[type=text] { flex:1; min-width:120px; }
.pe-list { display:flex; flex-direction:column; gap:4px; max-height:300px; overflow-y:auto; margin-bottom:10px; }
.pe-bulk-bar {
  display:flex; align-items:center; gap:8px; padding:7px 10px; margin-bottom:6px;
  background:var(--em-chip-bg); border:1.5px solid var(--em-border); border-radius:7px;
}
.pe-row {
  display:grid; grid-template-columns:70px 1fr 1fr auto;
  align-items:center; gap:6px;
  padding:5px 8px; background:var(--surface);
  border:1px solid var(--border); border-radius:6px; font-size:12px;
}
.pe-row .pe-id { font-weight:700; color:var(--text); }
.pe-row .pe-zone { color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pe-row .pe-loc { color:var(--text3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pe-row input, .pe-row select {
  background:var(--input-bg); border:1.5px solid var(--border); border-radius:5px;
  color:var(--text); padding:3px 7px; font-size:12px; outline:none; font-family:inherit; width:100%;
  transition:border-color 0.15s;
}
.pe-row input:focus, .pe-row select:focus { border-color:var(--em-border); }
.pe-row input.changed, .pe-row select.changed { border-color:var(--em-border); background:var(--em-chip-bg); }
.pe-btn { background:none; border:1px solid var(--border); border-radius:5px; cursor:pointer;
  font-size:11px; padding:3px 8px; color:var(--text3); font-family:inherit; transition:all 0.12s; white-space:nowrap; }
.pe-btn:hover { border-color:var(--text3); color:var(--text); }
.pe-btn.del:hover { border-color:var(--pm-text); color:var(--pm-text); }
.pe-btn.save { color:var(--em-text); border-color:var(--em-border); }
.pe-add-form {
  display:grid; grid-template-columns:70px 1fr 1fr auto;
  align-items:center; gap:6px; padding-top:10px;
  border-top:1px solid var(--border);
}
.pe-add-form input, .pe-add-form select {
  background:var(--input-bg); border:1.5px solid var(--border); border-radius:6px;
  color:var(--text); padding:5px 8px; font-size:12px; outline:none; font-family:inherit; width:100%;
}
.pe-empty { font-size:11px; color:var(--text4); padding:8px 0; }

.controls {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:14px 24px; display:flex; flex-direction:column; gap:10px;
}
.section-label {
  font-size:14px; font-weight:bold; color:var(--text);
  letter-spacing:1px; text-transform:uppercase; margin-bottom:2px;
}
.row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
label { font-size:14px; font-weight:bold; color:var(--text); min-width:52px; }

input[type=text], input[type=password], input[type=date] {
  background:var(--input-bg); border:1.5px solid var(--border);
  border-radius:7px; color:var(--text); padding:8px 12px;
  font-size:13px; outline:none; font-family:inherit;
  transition:border-color 0.15s,box-shadow 0.15s;
}
input[type=text]:focus, input[type=password]:focus, input[type=date]:focus {
  border-color:var(--text3); box-shadow:0 0 0 3px rgba(128,128,128,0.1);
}
input[type=date] { cursor:pointer; }
.token-input { width:400px; font-size:11px; }
.id-input { width:88px; font-weight:700; letter-spacing:1px; }
.extra-id-input { width:240px; }
.fixed-id {
  background:var(--input-bg); border:1.5px solid var(--border);
  border-radius:7px; color:var(--text3); padding:8px 12px; font-size:13px;
  width:88px; font-weight:700; text-align:center; letter-spacing:1px;
}
.dash { color:var(--border); font-size:18px; padding:0 2px; }

.extra-ids-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; min-height:30px; }
.extra-id-tag {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--tag-bg); border:1px solid var(--tag-border);
  border-radius:20px; padding:3px 8px 3px 12px;
  font-size:12px; color:var(--text2);
}
.extra-id-tag button {
  background:none; border:none; color:var(--text4); cursor:pointer;
  font-size:15px; line-height:1; padding:0; transition:color 0.1s;
}
.extra-id-tag button:hover { color:var(--pm-text); }

.btn-primary {
  background:var(--btn-bg); color:var(--btn-text); border:none;
  border-radius:7px; padding:9px 26px; font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:opacity 0.15s;
}
.btn-primary:hover:not(:disabled) { opacity:0.8; }
.btn-primary:disabled { opacity:0.3; cursor:not-allowed; }
.btn-add {
  background:transparent; color:var(--text3); border:1.5px dashed var(--border);
  border-radius:7px; padding:7px 14px; font-size:12px;
  cursor:pointer; font-family:inherit; transition:all 0.12s;
}
.btn-add:hover { border-color:var(--text3); color:var(--text2); }
.btn-ghost {
  background:transparent; color:var(--text3); border:1.5px solid var(--border);
  border-radius:7px; padding:7px 14px; font-size:12px;
  cursor:pointer; font-family:inherit; transition:all 0.12s;
}
.btn-ghost:hover { color:var(--text2); border-color:var(--text3); }
.btn-copy {
  background:transparent; color:var(--text3); border:1px solid var(--border);
  border-radius:6px; padding:6px 12px; font-size:11px;
  cursor:pointer; font-family:inherit; transition:all 0.12s;
}
.btn-copy:hover { color:var(--text); border-color:var(--text3); }
.btn-danger {
  background:transparent; color:var(--pm-text); border:1.5px solid var(--pm-border);
  border-radius:7px; padding:5px 10px; font-size:11px;
  cursor:pointer; font-family:inherit; transition:all 0.12s;
}
.btn-danger:hover { background:var(--pm-bg); }

.divider { border:none; border-top:1px solid var(--border2); margin:2px 0; }
.error-msg { color:var(--pm-text); font-size:12px; }

/* 관리자 인증 */
.admin-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.admin-pw-input { width:180px; }
.admin-auth-badge {
  font-size:11px; font-weight:600; padding:4px 10px;
  border-radius:20px; display:none;
}
.admin-auth-badge.ok { display:inline-block; background:var(--ok-bg); color:var(--ok-text); border:1px solid var(--ok-border); }
.admin-auth-badge.fail { display:inline-block; background:var(--pm-bg); color:var(--pm-text); border:1px solid var(--pm-border); }

/* 로딩 */
.loading-overlay {
  display:none; position:fixed; inset:0; background:var(--overlay-bg);
  z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.loading-overlay.active { display:flex; }
.spinner {
  width:44px; height:44px; border:3px solid var(--spinner-track);
  border-top-color:var(--spinner-head); border-radius:50%;
  animation:spin 0.75s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(--text2); }
.loading-bar-wrap { width:240px; height:3px; background:var(--bar-bg); border-radius:2px; overflow:hidden; }
.loading-bar { height:100%; background:var(--bar-fg); border-radius:2px; transition:width 0.2s ease; width:0%; }

.debug-box {
  margin:10px 32px; padding:10px 14px;
  background:var(--log-bg); border:1px solid var(--border); border-radius:8px;
  font-size:11px; max-height:150px; overflow-y:auto; line-height:1.9;
}
.log-err { color:var(--pm-text); } .log-warn { color:var(--text3); }
.log-ok  { color:var(--ok-text); } .log-info { color:var(--text3); }
.log-muted { color:var(--text4); }

.summary {
  background:var(--summary-bg); display:flex; gap:8px; padding:14px 32px;
  border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center;
}
.summary-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
.chip {
  display:flex; flex-direction:column; align-items:center;
  padding:8px 16px; border-radius:8px; border:2px solid;
  cursor:pointer; background:transparent; gap:1px;
  min-width:60px; transition:all 0.12s; font-family:inherit;
}
.chip:hover { transform:translateY(-1px); }
.chip-label { font-size:10px; letter-spacing:1px; font-weight:600; }
.chip-count { font-size:20px; font-weight:700; }

.view-tabs {
  display:flex; border:1.5px solid var(--border);
  border-radius:7px; overflow:hidden; background:var(--input-bg);
}
.view-tab {
  padding:6px 14px; font-size:11px; cursor:pointer;
  background:transparent; border:none; color:var(--text3);
  font-family:inherit; transition:all 0.12s;
}
.view-tab.active { background:var(--surface); color:var(--text2); box-shadow:0 1px 4px rgba(0,0,0,0.1); }
.view-tab:hover:not(.active) { color:var(--text2); }

.grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px; padding:20px 32px;
}
.card {
  border-radius:9px; border:2px solid; padding:8px;
  display:flex; flex-direction:column; align-items:center;
  gap:4px; cursor:default; position:relative;
  transition:transform 0.12s,box-shadow 0.12s;
}
.card:hover { transform:translateY(-2px); }
.card-ok  { background:var(--ok-bg);  border-color:var(--ok-border); }
.card-no  { background:var(--no-bg);  border-color:var(--no-border);  box-shadow:0 2px 8px rgba(100,100,100,0.18); }
.card-em  { background:var(--em-bg);  border-color:var(--em-border);  box-shadow:0 2px 10px rgba(41,121,212,0.25); }
.card-pm  { background:var(--pm-bg);  border-color:var(--pm-border);  box-shadow:0 2px 10px rgba(212,50,50,0.25); }
.card-err { background:var(--err-bg); border-color:var(--err-border); box-shadow:0 2px 10px rgba(196,154,16,0.25); }
.card-load{ background:var(--input-bg); border-color:var(--border); }
.card-status { font-size:11px; font-weight:800; letter-spacing:2px; }
.card-id { font-size:14px; font-weight:700; color:var(--text2); }
.card-meta { font-size:12px; color:var(--text3); }
.card-err-text { font-size:12px; color:var(--err-text); text-align:center; word-break:break-all; }
.card:hover .tooltip { display:block; }
.tooltip {
  display:none; position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
  background:var(--tooltip-bg); border:1px solid var(--tooltip-border); border-radius:8px;
  padding:9px 12px; font-size:14px; white-space:nowrap; z-index:50;
  color:var(--tooltip-text); line-height:1.8; pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,0.14);
}

.list-toolbar { display:flex; align-items:center; gap:10px; padding:14px 32px 0; flex-wrap:wrap; }
.list-filter-sel {
  background:var(--input-bg); border:1.5px solid var(--border); border-radius:6px;
  color:var(--text2); padding:6px 10px; font-size:12px; outline:none; font-family:inherit; cursor:pointer;
}
.list-view { padding:14px 32px; }
.list-header {
  display:grid; grid-template-columns:130px 70px 1fr; padding:8px 14px;
  font-size:10px; letter-spacing:1px; text-transform:uppercase;
  color:var(--text3); background:var(--input-bg);
  border:1.5px solid var(--border); border-radius:8px 8px 0 0;
}
.list-body {
  border:1.5px solid var(--border); border-top:none;
  border-radius:0 0 8px 8px; overflow:hidden;
  max-height:520px; overflow-y:auto; background:var(--surface);
}
.list-row {
  display:grid; grid-template-columns:130px 70px 1fr;
  padding:8px 14px; font-size:12px;
  border-bottom:1px solid var(--border2); align-items:center; transition:background 0.08s;
}
.list-row:last-child { border-bottom:none; }
.list-row:hover { background:var(--input-bg); }
.list-id-cell { color:var(--text2); font-size:13px; font-weight:600; }
.list-status-cell { font-weight:800; font-size:11px; letter-spacing:1px; }
.list-time-cell { color:var(--text3); font-size:11px; }

.mode-tabs {
  display:flex; border:1.5px solid var(--border); border-radius:8px;
  overflow:hidden; background:var(--input-bg); width:fit-content;
}
.mode-tab {
  padding:7px 20px; font-size:12px; font-weight:500; cursor:pointer;
  background:transparent; border:none; color:var(--text3);
  font-family:inherit; transition:all 0.12s;
}
.mode-tab.active { background:var(--surface); color:var(--text); font-weight:600; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
.mode-tab:hover:not(.active) { color:var(--text2); }

/* 단일 검색 날짜 테이블 */
.single-detail-wrap { margin-top:14px; }
.single-detail-title { font-size:13px; font-weight:700; color:var(--text2); margin-bottom:8px; }
.single-detail-scroll { overflow-x:auto; border-radius:8px; border:1.5px solid var(--border); }
.single-detail-table {
  width:100%; border-collapse:collapse; font-size:12px;
  background:var(--surface); table-layout:fixed;
}
.single-detail-table colgroup col:nth-child(1) { width:44%; }
.single-detail-table colgroup col:nth-child(2),
.single-detail-table colgroup col:nth-child(3),
.single-detail-table colgroup col:nth-child(4) { width:18.67%; }
.single-detail-table th {
  background:var(--input-bg); color:var(--text3); font-size:10px;
  letter-spacing:0.5px; padding:8px 10px;
  border-bottom:1.5px solid var(--border); text-align:center; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.single-detail-table th:first-child { text-align:left; }
.single-detail-table td {
  padding:7px 10px; border-bottom:1px solid var(--border2);
  color:var(--text2); white-space:nowrap; text-align:center;
  overflow:hidden; text-overflow:ellipsis;
}
.single-detail-table td:first-child { text-align:left; font-size:11px; }
.single-detail-table tr:last-child td { border-bottom:none; }
.single-detail-table tr:hover td { background:var(--input-bg); }
.single-detail-empty { font-size:13px; color:var(--text4); padding:16px 0; }

/* 영역 지정 점검 */
.zone-header {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px;
}
.zone-search-input {
  background:var(--input-bg); border:1.5px solid var(--border); border-radius:7px;
  color:var(--text); padding:7px 12px; font-size:12px; outline:none;
  font-family:inherit; width:200px; transition:border-color 0.15s;
}
.zone-search-input:focus { border-color:var(--text3); }
.zone-search-input::placeholder { color:var(--text4); }
.btn-zone-toggle {
  background:transparent; color:var(--text3); border:1.5px solid var(--border);
  border-radius:7px; padding:6px 12px; font-size:12px; cursor:pointer;
  font-family:inherit; transition:all 0.12s; display:flex; align-items:center; gap:5px;
}
.btn-zone-toggle:hover { color:var(--text2); border-color:var(--text3); }
.zone-toggle-arrow { font-size:10px; display:inline-block; transition:transform 0.2s; }
.zone-toggle-arrow.open { transform:rotate(180deg); }
.zone-grid-wrap {
  overflow:hidden; transition:max-height 0.3s ease, opacity 0.2s ease;
  max-height:0; opacity:0;
}
.zone-grid-wrap.open { max-height:9999px; opacity:1; }
.zone-grid {
  display:flex; flex-wrap:wrap; gap:8px; padding-bottom:4px;
}
.zone-btn {
  display:flex; flex-direction:column; align-items:center;
  padding:8px 14px; border-radius:8px; border:1.5px solid var(--border);
  background:var(--input-bg); color:var(--text2);
  font-family:inherit; font-size:12px; font-weight:600;
  cursor:pointer; transition:all 0.12s; gap:2px; min-width:80px;
}
.zone-btn:hover { border-color:var(--text3); color:var(--text); }
.zone-btn.selected { border-color:var(--em-border); background:var(--em-chip-bg); color:var(--em-chip-text); }
.zone-btn.hidden { display:none; }

<!--
================================================================================
 Google Apps Script 코드 — 아래 코드를 복사하여 GAS 프로젝트에 붙여넣고
 [배포 > 새 배포 > 웹앱] 으로 배포 후 URL을 아래 GAS_URL 변수에 입력하세요.
 액세스 권한: "모든 사용자"로 설정해야 합니다.

 시트 구조:
   점검 결과 시트 (예: "26년 4월")
     - 8행  : 날짜 헤더 (예: "04.27(일)") — D열부터 오른쪽으로 날짜 순
     - B열  : 제품 ID (9행부터)

   제품 리스트 시트 ("제품 리스트")
     - 3행  : 헤더 (B=제품ID, C=영역명, E=설치장소)
     - 4행~ : 데이터
================================================================================

// GET 요청 — 제품 리스트 시트에서 영역/설치장소 반환
// 반환 형식: { success, zones:[{name,ids[]}], locations:{id:loc} }
function doGet(e) {
  try {
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = ss.getSheetByName('제품 리스트');
    if (!sheet) {
      return buildJson({ success: false, error: '제품 리스트 시트 없음' });
    }
    var lastRow = sheet.getLastRow();
    var locations = {};
    var zoneMap   = {};   // zoneName -> [id, ...]
    var zoneOrder = [];   // 등장 순서 유지
    if (lastRow >= 4) {
      // B(2)=제품ID, C(3)=영역명, D(4)=설치장소 → getRange(4, 2, n, 3)
      var rows = sheet.getRange(4, 2, lastRow - 3, 3).getValues();
      rows.forEach(function(row) {
        var id   = String(row[0]).trim();
        var zone = String(row[1]).trim();
        var loc  = String(row[2]).trim();
        if (!id) return;
        if (zone) {
          if (!zoneMap[zone]) { zoneMap[zone] = []; zoneOrder.push(zone); }
          zoneMap[zone].push(id);
        }
        if (loc) locations[id] = loc;
      });
    }
    var zones = zoneOrder.map(function(name) {
      return { name: name, ids: zoneMap[name] };
    });
    return buildJson({ success: true, zones: zones, locations: locations });
  } catch(err) {
    return buildJson({ success: false, error: err.message });
  }
}

// POST 요청 — action에 따라 처리
function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var action = data.action || 'saveResults';

    if (action === 'addProduct')    return handleAddProduct(data);
    if (action === 'updateProduct') return handleUpdateProduct(data);
    if (action === 'deleteProduct') return handleDeleteProduct(data);

    // 저장 요청 시각 기준으로 KST 날짜 산출
    var savedDate = data.savedAt ? new Date(data.savedAt) : new Date();
    var DAYS = ['일','월','화','수','목','금','토'];
    var month = Utilities.formatDate(savedDate, 'Asia/Seoul', 'MM');
    var day   = Utilities.formatDate(savedDate, 'Asia/Seoul', 'dd');
    var kstYMD = Utilities.formatDate(savedDate, 'Asia/Seoul', 'yyyy-MM-dd').split('-');
    var kstDate = new Date(parseInt(kstYMD[0]), parseInt(kstYMD[1]) - 1, parseInt(kstYMD[2]));
    var todayStr = month + '.' + day + '(' + DAYS[kstDate.getDay()] + ')';  // 예: "04.27(일)"

    // 시트명: "YY년 M월"
    var sheetName = (parseInt(kstYMD[0]) % 100) + '년 ' + parseInt(kstYMD[1]) + '월';
    var ss    = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = ss.getSheetByName(sheetName);
    if (!sheet) {
      return buildJson({ success: false, error: '시트 없음: ' + sheetName });
    }

    // 8행에서 오늘 날짜와 일치하는 열 찾기
    var lastCol    = sheet.getLastColumn();
    var headerVals = sheet.getRange(8, 1, 1, lastCol).getValues()[0];
    var targetCol  = -1;
    for (var c = 0; c < headerVals.length; c++) {
      if (String(headerVals[c]).trim() === todayStr) {
        targetCol = c + 1;  // 1-based
        break;
      }
    }
    if (targetCol === -1) {
      return buildJson({ success: false, error: '날짜 열 없음: ' + todayStr + ' (시트: ' + sheetName + ')' });
    }

    // B열에서 제품 ID 찾기 (9행부터)
    var lastRow = sheet.getLastRow();
    var idVals  = lastRow >= 9 ? sheet.getRange(9, 2, lastRow - 8, 1).getValues() : [];

    var updated = 0;
    var notFound = [];
    data.results.forEach(function(r) {
      var found = false;
      for (var i = 0; i < idVals.length; i++) {
        if (String(idVals[i][0]).trim() === String(r.id).trim()) {
          sheet.getRange(i + 9, targetCol).setValue(String(r.status).toUpperCase());
          updated++;
          found = true;
          break;
        }
      }
      if (!found) notFound.push(r.id);
    });

    return buildJson({
      success: true,
      updated: updated,
      total: data.results.length,
      notFound: notFound,
      sheet: sheetName,
      col: todayStr
    });
  } catch(err) {
    return buildJson({ success: false, error: err.message });
  }
}

// 제품 리스트 시트에서 ID로 행 번호 찾기 (없으면 -1)
function findProductRow(sheet, id) {
  var lastRow = sheet.getLastRow();
  if (lastRow < 4) return -1;
  var ids = sheet.getRange(4, 2, lastRow - 3, 1).getValues();
  for (var i = 0; i < ids.length; i++) {
    if (String(ids[i][0]).trim() === String(id).trim()) return i + 4;
  }
  return -1;
}

function handleAddProduct(data) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName('제품 리스트');
  if (!sheet) return buildJson({ success: false, error: '제품 리스트 시트 없음' });
  // 중복 체크
  if (findProductRow(sheet, data.id) !== -1)
    return buildJson({ success: false, error: '이미 존재하는 ID: ' + data.id });
  var nextRow = sheet.getLastRow() + 1;
  sheet.getRange(nextRow, 2, 1, 3).setValues([[data.id, data.zone || '', data.location || '']]);
  return buildJson({ success: true, id: data.id });
}

function handleUpdateProduct(data) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName('제품 리스트');
  if (!sheet) return buildJson({ success: false, error: '제품 리스트 시트 없음' });
  var row = findProductRow(sheet, data.id);
  if (row === -1) return buildJson({ success: false, error: 'ID 없음: ' + data.id });
  sheet.getRange(row, 3, 1, 2).setValues([[data.zone || '', data.location || '']]);
  return buildJson({ success: true, id: data.id });
}

function handleDeleteProduct(data) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName('제품 리스트');
  if (!sheet) return buildJson({ success: false, error: '제품 리스트 시트 없음' });
  var row = findProductRow(sheet, data.id);
  if (row === -1) return buildJson({ success: false, error: 'ID 없음: ' + data.id });
  sheet.deleteRow(row);
  return buildJson({ success: true, id: data.id });
}

function buildJson(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}
================================================================================
-->

<script>
/* ===== 설정 ===== */
const ADMIN_PASSWORD = 'airmax87'; /* 관리자 비밀번호 */
const GAS_URL        = 'https://script.google.com/macros/s/AKfycbwlcEh7wNrxgMFHJoWx_JY0aHLPVC7BR8R4soEKbNdBE9tytIYqtyAHgdzkxb_02K5lBQ/exec'; 
const API      = 'https://api-airmax.testonic.co.kr/api/external/reports';
const LS_EXTRA = 'airmax_extra_ids';
const LS_ENDID = 'airmax_end_id';
const LS_THEME = 'airmax_theme';
const LS_MODE  = 'airmax_mode';
const LS_PROD_LOCS    = 'airmax_product_locations';
const LS_SHEET_CACHE  = 'airmax_sheet_cache';
const CACHE_TTL       = 3600000; // 1시간 (ms)


/* ===== 상태 ===== */
let selectedZones   = new Set();
let zoneGridOpen    = false;
let adminAuthenticated = false;
let sheetZones      = [];   // [{name, ids[]}] — GAS 시트에서 로드
let productLocations    = {};   // {id: loc} — GAS 시트에서 로드
let productLocEditorOpen = false;
let peEditMode = false;
let peOriginals = {};

let results=[], currentFilter='ALL', currentView='grid', currentMode='range';
let logVisible=false, logs=[], extraIds=[];
let lastResults = []; // GAS 저장용

const STATUS = {
  OK:   {label:'OK',  cls:'card-ok',   textVar:'--ok-text',  chipBgVar:'--ok-chip-bg',  chipBdVar:'--ok-chip-border',  chipTxVar:'--ok-chip-text'  },
  NO:   {label:'NO',  cls:'card-no',   textVar:'--no-text',  chipBgVar:'--no-chip-bg',  chipBdVar:'--no-chip-border',  chipTxVar:'--no-chip-text'  },
  EM:   {label:'EM',  cls:'card-em',   textVar:'--em-text',  chipBgVar:'--em-chip-bg',  chipBdVar:'--em-chip-border',  chipTxVar:'--em-chip-text'  },
  PM:   {label:'PM',  cls:'card-pm',   textVar:'--pm-text',  chipBgVar:'--pm-chip-bg',  chipBdVar:'--pm-chip-border',  chipTxVar:'--pm-chip-text'  },
  ERR:  {label:'ERR', cls:'card-err',  textVar:'--err-text', chipBgVar:'--err-chip-bg', chipBdVar:'--err-chip-border', chipTxVar:'--err-chip-text' },
  LOAD: {label:'···', cls:'card-load', textVar:'--text4',    chipBgVar:'--input-bg',    chipBdVar:'--border',          chipTxVar:'--text4'         },
};

/* ===== 유틸 ===== */
function lsGet(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getAllZones(){
  return sheetZones;
}

/* ===== 테마 ===== */
function toggleTheme(){
  const html=document.documentElement;
  const next=html.getAttribute('data-theme')==='dark'?'light':'dark';
  html.setAttribute('data-theme',next); lsSet(LS_THEME,next);
  document.getElementById('themeIcon').textContent=next==='dark'?'☀️':'🌙';
}

/* ===== 관리자 인증 ===== */
function authenticateAdmin(){
  const pw=document.getElementById('adminPwInput').value;
  const badge=document.getElementById('adminAuthBadge');
  if(pw===ADMIN_PASSWORD){
    adminAuthenticated=true;
    badge.textContent='✓ 인증됨'; badge.className='admin-auth-badge ok';
    document.getElementById('adminPwInput').value='';
    document.getElementById('adminPwInput').disabled=true;
    document.getElementById('deauthBtn').style.display='inline-block';
    updateRunBtnText();
    document.getElementById('adminActionsRow').style.display='flex';
    updateSheetBtn();
  } else {
    badge.textContent='✗ 비밀번호 오류'; badge.className='admin-auth-badge fail';
    setTimeout(()=>{badge.className='admin-auth-badge';},2500);
  }
}

function deauthAdmin(){
  adminAuthenticated=false;
  const badge=document.getElementById('adminAuthBadge');
  badge.className='admin-auth-badge';
  document.getElementById('adminPwInput').disabled=false;
  document.getElementById('deauthBtn').style.display='none';
  document.getElementById('adminActionsRow').style.display='none';
  document.getElementById('productEditorSection').style.display='none';
  productLocEditorOpen=false;
  updateRunBtnText();
  updateSheetBtn();
}

function updateRunBtnText(){
  const btn=document.getElementById('runBtn');
  const mBtn=document.getElementById('mobileRunBtn');
  const label=(adminAuthenticated && currentMode==='range')?'점검 및 시트 저장':'점검 시작';
  btn.textContent=label;
  mBtn.textContent=label;
}


function updateSheetBtn(){
  const btn=document.getElementById('saveSheetBtn');
  btn.style.display=(adminAuthenticated && currentMode==='range' && lastResults.length>0)?'inline-block':'none';
}

/* ===== GAS 저장 ===== */
async function saveToSheet(){
  if(!GAS_URL){
    alert('GAS_URL이 설정되지 않았습니다.\nindex.html 상단의 GAS_URL 변수에 배포된 Google Apps Script URL을 입력해주세요.');
    return;
  }
  if(!lastResults.length){ alert('저장할 결과가 없습니다.'); return; }
  const btn=document.getElementById('saveSheetBtn');
  btn.disabled=true; btn.textContent='저장 중…';
  try {
    const res=await fetch(GAS_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({results:lastResults, savedAt:new Date().toISOString()})
    });
    const json=await res.json();
    if(json.success){
      btn.textContent=`✓ ${json.updated}/${json.total}개 저장 완료`;
      addLog(`시트 저장 완료 — ${json.sheet} [${json.col}] ${json.updated}/${json.total}건`,'ok');
      if(json.notFound&&json.notFound.length) addLog('미등록 ID: '+json.notFound.join(', '),'warn');
    } else {
      btn.textContent='저장 실패';
      addLog('시트 저장 실패: '+(json.error||'알 수 없는 오류'),'err');
      alert('시트 저장 실패\n\n'+(json.error||'알 수 없는 오류'));
    }
    setTimeout(()=>{ btn.textContent='시트에 저장'; btn.disabled=false; },3000);
  } catch(e) {
    addLog('시트 저장 오류: '+e.message,'err');
    alert('저장 중 오류가 발생했습니다.\n\n'+e.message+'\n\nGAS URL 또는 배포 설정을 확인해주세요.');
    btn.textContent='시트에 저장'; btn.disabled=false;
  }
}

/* ===== 시트 데이터 로드 (영역 + 설치장소, 캐시 1시간) ===== */
async function loadSheetData(force=false){
  const cached=lsGet(LS_SHEET_CACHE,null);
  const now=Date.now();
  const expired=!cached||(now-cached.ts)>CACHE_TTL;

  // 캐시 있으면 즉시 적용 (만료 여부 무관)
  if(cached&&cached.zones){
    sheetZones=cached.zones;
    productLocations=Object.assign({},cached.locations||{});
    renderZoneGrid();
  }

  if((expired||force)&&GAS_URL){
    try{
      const res=await fetch(GAS_URL);
      const json=await res.json();
      if(json.success){
        sheetZones=json.zones||[];
        productLocations=Object.assign({},json.locations||{});
        lsSet(LS_SHEET_CACHE,{ts:now,zones:sheetZones,locations:json.locations||{}});
        renderZoneGrid();
        const msg=force?'시트 데이터 새로고침 완료'
          :(cached?'시트 데이터 갱신':'시트 데이터 로드');
        addLog(`${msg} — 영역 ${sheetZones.length}개, 설치 장소 ${Object.keys(json.locations||{}).length}건`,'ok');
        if(force) alert(`영역 새로고침 완료\n\n영역 ${sheetZones.length}개, 설치 장소 ${Object.keys(json.locations||{}).length}건 로드됨`);
      }
    }catch(e){
      if(!cached) addLog('시트 데이터 로드 실패 (GAS 미설정 또는 오류): '+e.message,'warn');
    }
  }
}

/* ===== 날짜 ===== */
function todayStr(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function yesterdayStr(){
  const d=new Date(); d.setDate(d.getDate()-1);
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDateRange(mode){
  const today=todayStr(), yest=yesterdayStr();
  if(mode==='single'){
    const s=document.getElementById('singleStartDate').value||yest;
    const e=document.getElementById('singleEndDate').value||today;
    return{started_at:s, finished_at:e};
  }
  if(mode==='zone'){
    return{started_at:yest, finished_at:today};
  }
  // range: 2일 전 ~ 오늘
  const d=new Date(); d.setDate(d.getDate()-2);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return{started_at:fmt(d), finished_at:today};
}

function updateDateInfo(){
  const dr=getDateRange(currentMode);
  document.getElementById('dateInfo').textContent=`조회 기간  ${dr.started_at} ~ ${dr.finished_at}`;
}

/* ===== 모드 전환 ===== */
function switchMode(mode){
  currentMode=mode; lsSet(LS_MODE,mode);
  ['range','single','zone'].forEach(m=>{
    document.getElementById('tab'+m.charAt(0).toUpperCase()+m.slice(1)).classList.toggle('active',m===mode);
    document.getElementById('panel'+m.charAt(0).toUpperCase()+m.slice(1)).style.display=m===mode?'block':'none';
  });
  if(mode==='zone') renderZoneGrid();
  updateMobileFixedBtn();
  updateRunBtnText();
  updateSheetBtn();
  updateDateInfo();
  // 단일 검색 결과 초기화
  if(mode!=='single'){
    document.getElementById('singleResultSection').style.display='none';
  }
  // 그리드/리스트 결과 초기화
  if(mode==='single'){
    document.getElementById('summary').style.display='none';
    document.getElementById('grid').style.display='none';
    document.getElementById('listView').style.display='none';
    document.getElementById('listToolbar').style.display='none';
  }
}

/* ===== 모바일 고정 버튼 ===== */
function updateMobileFixedBtn(){
  document.body.classList.toggle('zone-active', currentMode==='zone');
  updateMobileZoneInfo();
}

function updateMobileZoneInfo(){
  const infoEl=document.getElementById('mobileZoneInfo');
  const cnt=selectedZones.size;
  if(cnt===0){ infoEl.textContent='영역을 선택하세요'; return; }
  const ZONES=getAllZones();
  const total=[...selectedZones].reduce((s,i)=>s+(ZONES[i]?ZONES[i].ids.length:0),0);
  infoEl.textContent=`${cnt}개 영역 · ${total}개 제품`;
}

/* ===== 영역 그리드 접기/펼치기 ===== */
function toggleZoneGrid(){
  zoneGridOpen=!zoneGridOpen;
  const wrap=document.getElementById('zoneGridWrap');
  const arrow=document.getElementById('zoneArrow');
  const btn=document.getElementById('zoneToggleBtn');
  wrap.classList.toggle('open',zoneGridOpen);
  arrow.classList.toggle('open',zoneGridOpen);
  btn.querySelector('span').textContent=zoneGridOpen?'접기':'펼치기';
}

function filterZones(query){
  if(query && !zoneGridOpen) toggleZoneGrid();
  const q=query.trim().toLowerCase();
  let visible=0;
  document.querySelectorAll('.zone-btn').forEach(btn=>{
    const name=btn.querySelector('.zone-name').textContent.toLowerCase();
    const match=!q||name.includes(q);
    btn.classList.toggle('hidden',!match);
    if(match) visible++;
  });
  document.getElementById('zoneNoResult').style.display=visible===0?'block':'none';
}

function renderZoneGrid(){
  const ZONES=getAllZones();
  const q=document.getElementById('zoneSearchInput').value.trim().toLowerCase();
  document.getElementById('zoneGrid').innerHTML=ZONES.map((z,i)=>{
    const sel=selectedZones.has(i);
    const rangeText=z.ids.length===1?z.ids[0]:`${z.ids[0]}~${z.ids[z.ids.length-1]} (${z.ids.length}개)`;
    const hidden=q&&!z.name.toLowerCase().includes(q)?'hidden':'';
    return`<button class="zone-btn ${sel?'selected':''} ${hidden}" onclick="toggleZone(${i})">
      <span class="zone-name">${escHtml(z.name)}</span>
      <span class="zone-range">${rangeText}</span>
    </button>`;
  }).join('');
  updateZoneCount();
  if(q&&!zoneGridOpen) toggleZoneGrid();
  const allHidden=document.querySelectorAll('.zone-btn:not(.hidden)').length===0;
  document.getElementById('zoneNoResult').style.display=allHidden?'block':'none';
}

function updateZoneCount(){
  const ZONES=getAllZones();
  const cnt=selectedZones.size;
  const total=[...selectedZones].reduce((s,i)=>s+(ZONES[i]?ZONES[i].ids.length:0),0);
  document.getElementById('zoneSelectCount').textContent=
    cnt===0?'선택된 영역 없음':`${cnt}개 영역 / 총 ${total}개 제품 선택됨`;
  updateMobileZoneInfo();
}

function toggleZone(i){
  if(selectedZones.has(i)) selectedZones.delete(i);
  else selectedZones.add(i);
  renderZoneGrid();
}

function clearZones(){
  selectedZones.clear();
  renderZoneGrid();
}

/* ===== 시트 데이터 강제 새로고침 (관리자) ===== */
function refreshSheetData(){
  addLog('시트 데이터 새로고침 중…','muted');
  loadSheetData(true);
}


/* ===== ID 입력 제한 ===== */
function restrictIdInput(e){
  const allowed=['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Enter'];
  if(allowed.includes(e.key))return;
  if(/^[a-zA-Z0-9]$/.test(e.key)){
    if(e.target.value.length>=4){e.preventDefault();return;}
    if(/^[a-z]$/.test(e.key)){
      e.preventDefault();
      const pos=e.target.selectionStart;
      e.target.value=e.target.value.slice(0,pos)+e.key.toUpperCase()+e.target.value.slice(e.target.selectionEnd);
      e.target.setSelectionRange(pos+1,pos+1);
    }
    return;
  }
  e.preventDefault();
}

/* ===== 추가 ID ===== */
function addExtraId(){
  const inp=document.getElementById('extraIdInput');
  inp.value.trim().split(',').map(v=>v.trim()).filter(Boolean).forEach(v=>{
    if(!extraIds.includes(v)) extraIds.push(v);
  });
  inp.value=''; lsSet(LS_EXTRA,extraIds); renderExtraTags();
}
function removeExtraId(id){
  extraIds=extraIds.filter(v=>v!==id); lsSet(LS_EXTRA,extraIds); renderExtraTags();
}
function renderExtraTags(){
  document.getElementById('extraTagsRow').innerHTML=extraIds.length===0
    ?'<span style="color:var(--text4);font-size:12px">추가된 ID 없음</span>'
    :extraIds.map(id=>`<span class="extra-id-tag">${escHtml(id)}<button onclick="removeExtraId('${escHtml(id)}')" title="삭제">×</button></span>`).join('');
}

/* ===== ID 유틸 ===== */
function parseId(id){
  const m=id.trim().toUpperCase().match(/^([A-Z]*)(\d+)$/);
  if(!m)return null;
  return{prefix:m[1],num:parseInt(m[2],10),padLen:m[2].length};
}
function formatId(prefix,num,padLen){return prefix+String(num).padStart(padLen,'0');}

/* ===== 시간/분류 ===== */
function parseFormatTime(str){
  if(!str)return null;
  const d=new Date(str.replace(/\./g,'-').replace(' ','T'));
  return isNaN(d.getTime())?null:d;
}
function classify(item,nowMs){
  if(!item)return'NO';
  const d=parseFormatTime(item.format_created_time);
  if(!d)return'NO';
  if((nowMs-d.getTime())/3600000>=2)return'NO';
  const{pm_2_5,pm_10,co2}=item;
  if(pm_2_5===0&&pm_10===0&&co2===0)return'EM';
  if(pm_2_5===0&&pm_10===0&&co2!==0)return'PM';
  return'OK';
}

/* ===== API ===== */
async function fetchReport(controllerId,dateRange,token){
  const p=new URLSearchParams({controller_id:controllerId,started_at:dateRange.started_at,finished_at:dateRange.finished_at,per_page:'100'});
  const res=await fetch(`${API}?${p}`,{headers:{Authorization:`Bearer ${token}`,Accept:'application/json'}});
  if(!res.ok){const body=await res.text().catch(()=>'');throw new Error(`HTTP ${res.status}: ${body.slice(0,80)}`);}
  const json=await res.json();
  const data=json.data;
  if(!Array.isArray(data)||data.length===0)return null;
  return data[0];
}

async function fetchAllReports(controllerId,dateRange,token){
  const p=new URLSearchParams({controller_id:controllerId,started_at:dateRange.started_at,finished_at:dateRange.finished_at,per_page:'200'});
  const res=await fetch(`${API}?${p}`,{headers:{Authorization:`Bearer ${token}`,Accept:'application/json'}});
  if(!res.ok){const body=await res.text().catch(()=>'');throw new Error(`HTTP ${res.status}: ${body.slice(0,80)}`);}
  const json=await res.json();
  return Array.isArray(json.data)?json.data:[];
}

/* ===== 로그 ===== */
function addLog(msg,type='muted'){
  logs.push({t:new Date().toLocaleTimeString('ko-KR'),msg,type});
  if(logVisible)renderLog();
}
function renderLog(){
  const box=document.getElementById('debugBox');
  box.innerHTML=logs.map(l=>`<div class="log-${l.type}">[${l.t}] ${escHtml(l.msg)}</div>`).join('');
  box.scrollTop=box.scrollHeight;
}
function toggleLog(){
  logVisible=!logVisible;
  document.getElementById('debugBox').style.display=logVisible?'block':'none';
  document.getElementById('logBtn').textContent=logVisible?'로그 닫기':'로그 보기';
  if(logVisible)renderLog();
}

/* ===== 로딩 ===== */
function setLoading(on,done=0,total=0){
  document.getElementById('loadingOverlay').classList.toggle('active',on);
  if(on){
    document.getElementById('loadingBar').style.width=(total>0?Math.round(done/total*100):0)+'%';
    document.getElementById('loadingText').textContent=total>0?`데이터 수집 중… ${done} / ${total}`:'데이터 수집 중…';
  }
}

/* ===== Summary ===== */
function renderSummary(){
  const counts={};
  results.forEach(r=>{counts[r.status]=(counts[r.status]||0)+1;});
  const chipsHtml=['ALL','OK','NO','EM','PM','ERR'].map(s=>{
    const isAll=s==='ALL', cfg=isAll?null:STATUS[s];
    const cnt=isAll?results.length:(counts[s]||0);
    const active=currentFilter===s;
    let bg,bd,tx;
    if(active){
      bg=isAll?'var(--input-bg)':`var(${cfg.chipBgVar})`;
      bd=isAll?'var(--text3)':`var(${cfg.chipBdVar})`;
      tx=isAll?'var(--text2)':`var(${cfg.chipTxVar})`;
    }else{bg='transparent';bd='var(--chip-def-border)';tx='var(--chip-def-text)';}
    return`<button class="chip" onclick="setFilter('${s}')" style="border-color:${bd};background:${bg}">
      <span class="chip-label" style="color:${tx}">${isAll?'전체':cfg.label}</span>
      <span class="chip-count" style="color:${active?tx:'var(--chip-def-count)'};">${cnt}</span>
    </button>`;
  }).join('');
  const viewHtml=`<div class="summary-right"><div class="view-tabs">
    <button class="view-tab ${currentView==='grid'?'active':''}" onclick="switchView('grid')">그리드</button>
    <button class="view-tab ${currentView==='list'?'active':''}" onclick="switchView('list')">리스트</button>
  </div></div>`;
  document.getElementById('summary').innerHTML=chipsHtml+viewHtml;
}

/* ===== Grid / List ===== */
function renderGrid(){
  const filtered=currentFilter==='ALL'?results:results.filter(r=>r.status===currentFilter);
  document.getElementById('grid').innerHTML=filtered.map(r=>{
    const cfg=STATUS[r.status]||STATUS.LOAD;
    const loc=productLocations[r.id]||'';
    const tip=r.errMsg?escHtml(r.errMsg):r.item
      ?`PM10: ${r.item.pm_10}㎍/㎥ | PM2.5: ${r.item.pm_2_5}㎍/㎥ | CO2: ${r.item.co2}ppm<br>수집: ${escHtml(r.item.format_created_time)}`
      :'데이터 없음';
    return`<div class="card ${cfg.cls}">
      <div class="card-status" style="color:var(${cfg.textVar})">${cfg.label}</div>
      <div class="card-id">${escHtml(r.id)}</div>
      ${loc?`<div class="card-location">${escHtml(loc)}</div>`:''}
      ${r.item?`<div class="card-meta">${r.item.pm_10}㎍/㎥ | ${r.item.pm_2_5}㎍/㎥ | ${r.item.co2}ppm</div>`:''}
      ${r.status==='ERR'&&r.errMsg?`<div class="card-err-text">${escHtml(r.errMsg.slice(0,50))}</div>`:''}
      <div class="tooltip">${tip}</div>
    </div>`;
  }).join('');
}

/* ===== 제품 편집 (시트 연동) ===== */
function toggleProductEditor(){
  productLocEditorOpen=!productLocEditorOpen;
  const sec=document.getElementById('productEditorSection');
  sec.style.display=productLocEditorOpen?'block':'none';
  if(productLocEditorOpen) refreshProductEditorDropdowns(), renderProductEditor();
}

function refreshProductEditorDropdowns(){
  const zones=[...new Set(sheetZones.map(z=>z.name))];
  const filterSel=document.getElementById('peZoneFilter');
  const newZoneSel=document.getElementById('peNewZone');
  const curFilter=filterSel.value;
  filterSel.innerHTML='<option value="">전체 영역</option>'+zones.map(z=>`<option value="${escHtml(z)}"${z===curFilter?'selected':''}>${escHtml(z)}</option>`).join('');
  newZoneSel.innerHTML='<option value="">영역 선택</option>'+zones.map(z=>`<option value="${escHtml(z)}">${escHtml(z)}</option>`).join('');
}

function toggleNewZoneCustom(){
  const custom=document.getElementById('peNewZoneCustomToggle').checked;
  document.getElementById('peNewZone').style.display=custom?'none':'block';
  document.getElementById('peNewZoneCustom').style.display=custom?'block':'none';

function renderProductEditor(){
  const zoneFilter=document.getElementById('peZoneFilter').value;
  const q=document.getElementById('peSearch').value.trim().toLowerCase();
  // 모든 제품 목록 생성 후 ID순 정렬
  const allProducts=[];
  sheetZones.forEach(z=>z.ids.forEach(id=>{
    allProducts.push({id, zone:z.name, loc:productLocations[id]||''});
  }));
  allProducts.sort((a,b)=>a.id.localeCompare(b.id));
  // 필터
  const filtered=allProducts.filter(p=>{
    if(zoneFilter && p.zone!==zoneFilter) return false;
    if(q && !p.id.toLowerCase().includes(q) && !p.zone.toLowerCase().includes(q) && !p.loc.toLowerCase().includes(q)) return false;
    return true;
  });
  const el=document.getElementById('peList');
  if(!filtered.length){
    el.innerHTML=`<div class="pe-empty">${sheetZones.length?'검색 결과 없음':'시트 데이터 없음 — GAS URL 확인 또는 영역 새로고침'}</div>`;
    return;
  }
  // 원본 저장 (변경 감지용)
  peOriginals={};
  filtered.forEach(p=>{ peOriginals[p.id]={zone:p.zone, loc:p.loc}; });

  const zones=[...new Set(sheetZones.map(z=>z.name))];
  const datalist=`<datalist id="pe-zone-dl">${zones.map(z=>`<option value="${escHtml(z)}">`).join('')}</datalist>`;

  if(peEditMode){
    el.innerHTML=datalist+filtered.map(p=>`
      <div class="pe-row" id="pe-row-${escHtml(p.id)}">
        <span class="pe-id">${escHtml(p.id)}</span>
        <input id="pe-ez-${escHtml(p.id)}" value="${escHtml(p.zone)}" list="pe-zone-dl"
          oninput="markChanged(this,'${escHtml(p.id)}')"/>
        <input id="pe-el-${escHtml(p.id)}" value="${escHtml(p.loc)}" placeholder="설치 장소"
          oninput="markChanged(this,'${escHtml(p.id)}')"/>
        <button class="pe-btn del" onclick="deleteProductFromSheet('${escHtml(p.id)}')">삭제</button>
      </div>`).join('');
  } else {
    el.innerHTML=filtered.map(p=>`
      <div class="pe-row" id="pe-row-${escHtml(p.id)}">
        <span class="pe-id">${escHtml(p.id)}</span>
        <span class="pe-zone">${escHtml(p.zone)}</span>
        <span class="pe-loc">${escHtml(p.loc)||'—'}</span>
        <button class="pe-btn del" onclick="deleteProductFromSheet('${escHtml(p.id)}')">삭제</button>
      </div>`).join('');
  }
}

function markChanged(input, id){
  const orig=peOriginals[id];
  if(!orig) return;
  const zEl=document.getElementById('pe-ez-'+id);
  const lEl=document.getElementById('pe-el-'+id);
  const changed=(zEl&&zEl.value.trim()!==orig.zone)||(lEl&&lEl.value.trim()!==orig.loc);
  if(zEl) zEl.classList.toggle('changed', zEl.value.trim()!==orig.zone);
  if(lEl) lEl.classList.toggle('changed', lEl.value.trim()!==orig.loc);
  // 저장 버튼 상태 업데이트
  const changedCount=Object.keys(peOriginals).filter(i=>{
    const z=document.getElementById('pe-ez-'+i), l=document.getElementById('pe-el-'+i);
    return (z&&z.value.trim()!==peOriginals[i].zone)||(l&&l.value.trim()!==peOriginals[i].loc);
  }).length;
  const statusEl=document.getElementById('peBulkStatus');
  if(statusEl) statusEl.textContent=changedCount>0?`${changedCount}개 변경됨 — 일괄 저장으로 반영`:'편집 모드 — 수정 후 일괄 저장';
}

function toggleEditMode(){
  peEditMode=!peEditMode;
  document.getElementById('peEditModeBtn').textContent=peEditMode?'👁 보기 모드':'✏️ 전체 편집';
  document.getElementById('peBulkBar').style.display=peEditMode?'flex':'none';

function exitEditMode(){
  peEditMode=false;
  document.getElementById('peEditModeBtn').textContent='✏️ 전체 편집';
  document.getElementById('peBulkBar').style.display='none';
  renderProductEditor();
}

async function bulkSaveProducts(){
  if(!GAS_URL){ alert('GAS_URL이 설정되지 않았습니다.'); return; }
  // 변경된 항목만 수집
  const changed=[];
  Object.keys(peOriginals).forEach(id=>{
    const zEl=document.getElementById('pe-ez-'+id);
    const lEl=document.getElementById('pe-el-'+id);
    if(!zEl) return;
    const zone=zEl.value.trim(), loc=lEl?lEl.value.trim():'';
    if(zone!==peOriginals[id].zone || loc!==peOriginals[id].loc){
      if(!zone){ return; }
      changed.push({id, zone, location:loc});
    }
  });
  if(!changed.length){ alert('변경된 항목이 없습니다.'); return; }
  const saveBtn=document.querySelector('#peBulkBar .pe-btn.save');
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='저장 중…'; }
  try{
    const results=await Promise.all(changed.map(item=>
      fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'updateProduct',...item})})
        .then(r=>r.json())
    ));
    const ok=results.filter(r=>r.success).length;
    const fail=results.filter(r=>!r.success);
    // 로컬 캐시 업데이트
    changed.forEach(({id,zone,location})=>{
      const res=results[changed.findIndex(c=>c.id===id)];
      if(!res||!res.success) return;
      sheetZones.forEach(z=>{ z.ids=z.ids.filter(i=>i!==id); });
      sheetZones=sheetZones.filter(z=>z.ids.length>0);
      let zoneObj=sheetZones.find(z=>z.name===zone);
      if(!zoneObj){ zoneObj={name:zone,ids:[]}; sheetZones.push(zoneObj); }
      if(!zoneObj.ids.includes(id)) zoneObj.ids.push(id);
      if(location) productLocations[id]=location; else delete productLocations[id];
    });
    updateSheetCache();
    refreshProductEditorDropdowns();
    addLog(`일괄 저장 완료: ${ok}개 성공${fail.length?` / ${fail.length}개 실패`:''}`, 'ok');
    alert(`일괄 저장 완료\n\n${ok}개 저장됨${fail.length?`\n실패 ${fail.length}개: ${fail.map((_,i)=>changed[i]?.id).join(', ')}`:``}`);
    exitEditMode();
  }catch(e){
    alert('저장 중 오류: '+e.message);
  }
  if(saveBtn){ saveBtn.disabled=false; saveBtn.textContent='💾 일괄 저장'; }
}


async function deleteProductFromSheet(id){
  if(!confirm(`[${id}] 제품을 시트에서 삭제하시겠습니까?`)) return;
  if(!GAS_URL){ alert('GAS_URL이 설정되지 않았습니다.'); return; }
  const row=document.getElementById('pe-row-'+id);
  if(row) row.style.opacity='0.4';
  try{
    const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'deleteProduct',id})});
    const json=await res.json();
    if(json.success){
      sheetZones.forEach(z=>{ z.ids=z.ids.filter(i=>i!==id); });
      sheetZones=sheetZones.filter(z=>z.ids.length>0);
      delete productLocations[id];
      updateSheetCache();
      refreshProductEditorDropdowns();
      renderProductEditor();
      addLog(`[${id}] 삭제 완료`,'ok');
      alert(`[${id}] 삭제 완료`);
    } else {
      alert('삭제 실패: '+(json.error||'오류'));
      if(row) row.style.opacity='1';
    }
  }catch(e){ alert('오류: '+e.message); if(row) row.style.opacity='1'; }
}

async function addProductToSheet(){
  const id=document.getElementById('peNewId').value.trim().toUpperCase();
  const custom=document.getElementById('peNewZoneCustomToggle').checked;
  const zone=custom
    ? document.getElementById('peNewZoneCustom').value.trim()
    : document.getElementById('peNewZone').value.trim();
  const loc=document.getElementById('peNewLoc').value.trim();
  if(!id||id.length<2){ alert('제품 ID를 입력해주세요.'); return; }
  if(!zone){ alert('영역을 선택하거나 입력해주세요.'); return; }
  if(!GAS_URL){ alert('GAS_URL이 설정되지 않았습니다.'); return; }
  const btn=document.querySelector('.pe-add-form .btn-add');
  btn.disabled=true; btn.textContent='추가 중…';
  try{
    const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'addProduct',id,zone,location:loc})});
    const json=await res.json();
    if(json.success){
      let zoneObj=sheetZones.find(z=>z.name===zone);
      if(!zoneObj){ zoneObj={name:zone,ids:[]}; sheetZones.push(zoneObj); }
      if(!zoneObj.ids.includes(id)) zoneObj.ids.push(id);
      if(loc) productLocations[id]=loc;
      updateSheetCache();
      document.getElementById('peNewId').value='';
      document.getElementById('peNewLoc').value='';
      refreshProductEditorDropdowns();
      renderProductEditor();
      addLog(`[${id}] 추가 완료 (${zone})`,'ok');
      alert(`[${id}] 추가 완료\n영역: ${zone}${loc?'\n설치 장소: '+loc:''}`);
    } else {
      alert('추가 실패: '+(json.error||'오류'));
    }
  }catch(e){ alert('오류: '+e.message); }
  btn.disabled=false; btn.textContent='+ 추가';
}

function updateSheetCache(){
  lsSet(LS_SHEET_CACHE,{ts:Date.now(),zones:sheetZones,locations:productLocations});
}
function renderList(){
  const sel=document.getElementById('listFilterSel').value;
  const filtered=sel==='ALL'?results:results.filter(r=>r.status===sel);
  document.getElementById('listBody').innerHTML=filtered.map(r=>{
    const cfg=STATUS[r.status]||STATUS.LOAD;

      <div class="list-id-cell">${escHtml(r.id)}</div>

function copyListToClipboard(){
  const sel=document.getElementById('listFilterSel').value;
  const filtered=sel==='ALL'?results:results.filter(r=>r.status===sel);
  navigator.clipboard.writeText(filtered.map(r=>`${r.id}\t${r.status}`).join('\n')).then(()=>{
    const msg=document.getElementById('copyMsg');
    msg.style.display='inline';
    setTimeout(()=>{msg.style.display='none';},2000);

function switchView(v){

  document.getElementById('grid').style.display       =v==='grid'?'grid':'none';
  document.getElementById('listView').style.display   =v==='list'?'block':'none';

/* ===== 단일 검색 결과 렌더 ===== */
function fmtTime(str){
  if(!str) return '—';
  // "2026.04.26 05:07:00" → "04.26 05:07"
  const m=str.match(/\d{4}[.\-](\d{2})[.\-](\d{2})\s+(\d{2}:\d{2})/);
  return m?`${m[1]}.${m[2]} ${m[3]}`:str.slice(5,16);
}

function renderSingleDetail(id, items){
  const section=document.getElementById('singleResultSection');
  const title=document.getElementById('singleDetailTitle');
  const body=document.getElementById('singleDetailBody');
  title.textContent=`${id} — ${items.length}건`;
  if(!items.length){
    body.innerHTML=`<tr><td colspan="4" class="single-detail-empty" style="text-align:center">조회된 데이터가 없습니다</td></tr>`;
    section.style.display='block'; return;
  }
  body.innerHTML=items.map(item=>`<tr>
    <td>${escHtml(fmtTime(item.format_created_time))}</td>
    <td>${item.pm_10!==undefined?item.pm_10:'—'}</td>
    <td>${item.pm_2_5!==undefined?item.pm_2_5:'—'}</td>
    <td>${item.co2!==undefined?item.co2:'—'}</td>
  </tr>`).join('');
  section.style.display='block';
}

/* ===== 공통 실행 ===== */
async function runInspection(allIds){
  const token=document.getElementById('tokenInput').value.trim();
  if(!token){document.getElementById('errorMsg').textContent='⚠ 토큰이 설정되지 않았습니다.';return;}
  document.getElementById('runBtn').disabled=true;
  document.getElementById('summary').style.display='none';
  document.getElementById('grid').innerHTML=''; document.getElementById('listBody').innerHTML='';
  currentFilter='ALL'; currentView='grid';
  const dateRange=getDateRange(currentMode),nowMs=Date.now(),total=allIds.length;
  setLoading(true,0,total);
  addLog(`총 ${total}개 전체 동시 요청 시작`,'info');
  addLog(`기간: ${dateRange.started_at} ~ ${dateRange.finished_at}`,'muted');
  const out=allIds.map(id=>({id,status:'LOAD',item:null,errMsg:''}));
  let done=0;
  await Promise.all(allIds.map(async(id,idx)=>{
    try{
      const item=await fetchReport(id,dateRange,token);
      const status=classify(item,nowMs);
      out[idx]={id,status,item,errMsg:''};
      addLog(`[${id}] ${status}`+(item?` | ${item.format_created_time}`:'  | 데이터 없음'),status==='OK'?'ok':status==='ERR'?'err':'warn');
    }catch(err){
      out[idx]={id,status:'ERR',item:null,errMsg:err.message};
      addLog(`[${id}] ERR → ${err.message}`,'err');
    }
    setLoading(true,++done,total);
  }));
  results=out; lastResults=out; setLoading(false);
  document.getElementById('summary').style.display='flex';
  document.getElementById('grid').style.display='grid';
  document.getElementById('listView').style.display='none';
  document.getElementById('listToolbar').style.display='none';
  document.body.classList.remove('zone-active');
  if(zoneGridOpen) toggleZoneGrid();
  renderSummary(); renderGrid();
  addLog('✓ 점검 완료','ok');
  document.getElementById('runBtn').disabled=false;
  document.getElementById('logBtn').style.display='inline-block';
  if(adminAuthenticated) updateSheetBtn();
  if(logVisible)renderLog();
}

/* ===== 메인 진입 ===== */
async function startInspection(){
  const errEl=document.getElementById('errorMsg');
  errEl.textContent=''; logs=[];
  const token=document.getElementById('tokenInput').value.trim();

  /* 단일 검색 */
  if(currentMode==='single'){
    const raw=document.getElementById('singleIdInput').value.trim();
    if(!raw){errEl.textContent='⚠ 제품 ID를 입력해주세요.';return;}
    const dateRange=getDateRange('single');
    document.getElementById('runBtn').disabled=true;
    setLoading(true);
    try{
      const items=await fetchAllReports(raw,dateRange,token);
      renderSingleDetail(raw,items);
    }catch(e){
      errEl.textContent='⚠ 오류: '+e.message;
    }finally{
      setLoading(false);
      document.getElementById('runBtn').disabled=false;
    }
    return;
  }

  /* 영역 점검 */
  if(currentMode==='zone'){
    if(selectedZones.size===0){errEl.textContent='⚠ 영역을 하나 이상 선택해주세요.';return;}
    const ZONES=getAllZones();
    const zoneIds=[];
    selectedZones.forEach(i=>{ if(ZONES[i]) zoneIds.push(...ZONES[i].ids); });
    await runInspection([...new Set(zoneIds)]);
    return;
  }

  /* 범위/개별 */
  const startIdRaw=document.getElementById('startIdInput').value.trim()||'A001';
  const endIdRaw=document.getElementById('endIdInput').value.trim();
  let rangeIds=[];
  if(endIdRaw){
    const s=parseId(startIdRaw),e=parseId(endIdRaw);
    if(!s||!e){errEl.textContent='⚠ ID 형식이 잘못되었습니다. 예: A001';return;}
    if(s.prefix!==e.prefix){errEl.textContent='⚠ 시작/끝 ID 접두사가 같아야 합니다.';return;}
    if(s.num>e.num){errEl.textContent='⚠ 끝 ID가 시작 ID보다 작습니다.';return;}
    const padLen=Math.max(s.padLen,e.padLen);
    for(let n=s.num;n<=e.num;n++)rangeIds.push(formatId(s.prefix,n,padLen));
    lsSet(LS_ENDID,endIdRaw);
  }
  const allIds=[...new Set([...rangeIds,...extraIds])];
  if(allIds.length===0){errEl.textContent='⚠ 점검할 ID가 없습니다.';return;}
  await runInspection(allIds);
}
