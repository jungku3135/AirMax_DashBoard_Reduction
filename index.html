<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" href="https://airmax.testonic.co.kr/favicon.ico" type="image/x-icon" sizes="16x16">
<title>AIRMAX 제품 점검</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#f4f4f5; --surface:#ffffff; --border:#e0e0e0; --border2:#ebebeb;
  --text:#111111; --text2:#555555; --text3:#999999; --text4:#bbbbbb;
  --input-bg:#fafafa; --tag-bg:#f0f0f0; --tag-border:#d8d8d8;
  --btn-bg:#111111; --btn-text:#ffffff; --log-bg:#fafafa; --summary-bg:#ffffff;
  --chip-def-border:#e0e0e0; --chip-def-text:#bbb; --chip-def-count:#ccc;
  --overlay-bg:rgba(244,244,245,0.92); --spinner-track:#ddd; --spinner-head:#555;
  --bar-bg:#e5e5e5; --bar-fg:#555; --tooltip-bg:#ffffff;
  --tooltip-border:#e0e0e0; --tooltip-text:#333;
  --ok-bg:#e8f8e8; --ok-border:#52b852; --ok-text:#1e6e1e;
  --ok-chip-bg:#e8f8e8; --ok-chip-border:#52b852; --ok-chip-text:#1e6e1e;
  --no-bg:#f0f0f0; --no-border:#888888; --no-text:#333333;
  --no-chip-bg:#f0f0f0; --no-chip-border:#888888; --no-chip-text:#333333;
  --em-bg:#e0efff; --em-border:#2979d4; --em-text:#1450a0;
  --em-chip-bg:#e0efff; --em-chip-border:#2979d4; --em-chip-text:#1450a0;
  --pm-bg:#fde8e8; --pm-border:#d43232; --pm-text:#9a1010;
  --pm-chip-bg:#fde8e8; --pm-chip-border:#d43232; --pm-chip-text:#9a1010;
  --err-bg:#fef8e0; --err-border:#c49a10; --err-text:#7a5c00;
  --err-chip-bg:#fef8e0; --err-chip-border:#c49a10; --err-chip-text:#7a5c00;
}
[data-theme="dark"] {
  --bg:#181818; --surface:#222222; --border:#333333; --border2:#2a2a2a;
  --text:#e8e8e8; --text2:#aaaaaa; --text3:#666666; --text4:#444444;
  --input-bg:#2a2a2a; --tag-bg:#2e2e2e; --tag-border:#3a3a3a;
  --btn-bg:#e8e8e8; --btn-text:#111111; --log-bg:#1a1a1a; --summary-bg:#1e1e1e;
  --chip-def-border:#383838; --chip-def-text:#555; --chip-def-count:#444;
  --overlay-bg:rgba(18,18,18,0.92); --spinner-track:#333; --spinner-head:#aaa;
  --bar-bg:#2e2e2e; --bar-fg:#888; --tooltip-bg:#2a2a2a;
  --tooltip-border:#3a3a3a; --tooltip-text:#ccc;
  --ok-bg:#0e2a0e; --ok-border:#3a9e3a; --ok-text:#6dd86d;
  --ok-chip-bg:#0e2a0e; --ok-chip-border:#3a9e3a; --ok-chip-text:#6dd86d;
  --no-bg:#2a2a2a; --no-border:#888888; --no-text:#cccccc;
  --no-chip-bg:#2a2a2a; --no-chip-border:#888888; --no-chip-text:#cccccc;
  --em-bg:#0c1e38; --em-border:#4a9de8; --em-text:#7dc4ff;
  --em-chip-bg:#0c1e38; --em-chip-border:#4a9de8; --em-chip-text:#7dc4ff;
  --pm-bg:#2e0c0c; --pm-border:#e84a4a; --pm-text:#ff8888;
  --pm-chip-bg:#2e0c0c; --pm-chip-border:#e84a4a; --pm-chip-text:#ff8888;
  --err-bg:#2a1e00; --err-border:#d4a820; --err-text:#ffd060;
  --err-chip-bg:#2a1e00; --err-chip-border:#d4a820; --err-chip-text:#ffd060;
}

body {
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
  min-height:100vh; padding-bottom:80px;
  transition:background 0.2s,color 0.2s;
}

.header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:16px 32px 13px; position:sticky; top:0; z-index:100;
  box-shadow:0 1px 6px rgba(0,0,0,0.06);
  display:flex; align-items:center; justify-content:space-between;
}
.header-top { display:flex; align-items:baseline; gap:12px; }
.logo { font-size:24px; font-weight:bold; letter-spacing:3px; color:var(--text); }
.subtitle { font-size:16px; font-weight:bold; color:var(--text2); }
.date-info { font-size:12px; font-weight:bold; color:var(--text3); margin-top:4px; }

.theme-toggle {
  background:var(--input-bg); border:1.5px solid var(--border);
  border-radius:20px; padding:6px 14px; font-size:12px; color:var(--text2);
  cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px;
  transition:all 0.15s; white-space:nowrap;
}
.theme-toggle:hover { border-color:var(--text3); color:var(--text); }
.theme-icon { font-size:14px; }

.card-location { font-size:11px; color:var(--text3); font-weight:400; }

/* 제품 설치 장소 편집 */
.product-loc-section {
  margin-top:10px; padding:14px; background:var(--input-bg);
  border:1.5px solid var(--border); border-radius:8px;
}
.product-loc-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }

.controls {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:14px 24px; display:flex; flex-direction:column; gap:10px;
}
.section-label {
  font-size:14px; font-weight:bold; color:var(--text);
  letter-spacing:1px; text-transform:uppercase; margin-bottom:2px;
}
.row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
label { font-size:14px; font-weight:bold; color:var(--text); min-width:52px; }

input[type=text], input[type=password], input[type=date] {
  background:var(--input-bg); border:1.5px solid var(--border);
  border-radius:7px; color:var(--text); padding:8px 12px;
  font-size:13px; outline:none; font-family:inherit;
  transition:border-color 0.15s,box-shadow 0.15s;
}
input[type=text]:focus, input[type=password]:focus, input[type=date]:focus {
  border-color:var(--text3); box-shadow:0 0 0 3px rgba(128,128,128,0.1);
}
input[type=date] { cursor:pointer; }
.token-input { width:400px; font-size:11px; }
.id-input { width:88px; font-weight:700; letter-spacing:1px; }
.extra-id-input { width:240px; }
.fixed-id {
  background:var(--input-bg); border:1.5px solid var(--border);
  border-radius:7px; color:var(--text3); padding:8px 12px; font-size:13px;
  width:88px; font-weight:700; text-align:center; letter-spacing:1px;
}
.dash { color:var(--border); font-size:18px; padding:0 2px; }

.extra-ids-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; min-height:30px; }
.extra-id-tag {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--tag-bg); border:1px solid var(--tag-border);
  border-radius:20px; padding:3px 8px 3px 12px;
  font-size:12px; color:var(--text2);
}
.extra-id-tag button {
  background:none; border:none; color:var(--text4); cursor:pointer;
  font-size:15px; line-height:1; padding:0; transition:color 0.1s;
}
.extra-id-tag button:hover { color:var(--pm-text); }

.btn-primary {
  background:var(--btn-bg); color:var(--btn-text); border:none;
  border-radius:7px; padding:9px 26px; font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:opacity 0.15s;
}
.btn-primary:hover:not(:disabled) { opacity:0.8; }
.btn-primary:disabled { opacity:0.3; cursor:not-allowed; }
.btn-add {
  background:transparent; color:var(--text3); border:1.5px dashed var(--border);
  border-radius:7px; padding:7px 14px; font-size:12px;
  cursor:pointer; font-family:inherit; transition:all 0.12s;
}
.btn-add:hover { border-color:var(--text3); color:var(--text2); }
.btn-ghost {
  background:transparent; color:var(--text3); border:1.5px solid var(--border);
  border-radius:7px; padding:7px 14px; font-size:12px;
  cursor:pointer; font-family:inherit; transition:all 0.12s;
}
.btn-ghost:hover { color:var(--text2); border-color:var(--text3); }
.btn-copy {
  background:transparent; color:var(--text3); border:1px solid var(--border);
  border-radius:6px; padding:6px 12px; font-size:11px;
  cursor:pointer; font-family:inherit; transition:all 0.12s;
}
.btn-copy:hover { color:var(--text); border-color:var(--text3); }
.btn-danger {
  background:transparent; color:var(--pm-text); border:1.5px solid var(--pm-border);
  border-radius:7px; padding:5px 10px; font-size:11px;
  cursor:pointer; font-family:inherit; transition:all 0.12s;
}
.btn-danger:hover { background:var(--pm-bg); }

.divider { border:none; border-top:1px solid var(--border2); margin:2px 0; }
.error-msg { color:var(--pm-text); font-size:12px; }

/* 관리자 인증 */
.admin-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.admin-pw-input { width:180px; }
.admin-auth-badge {
  font-size:11px; font-weight:600; padding:4px 10px;
  border-radius:20px; display:none;
}
.admin-auth-badge.ok { display:inline-block; background:var(--ok-bg); color:var(--ok-text); border:1px solid var(--ok-border); }
.admin-auth-badge.fail { display:inline-block; background:var(--pm-bg); color:var(--pm-text); border:1px solid var(--pm-border); }

/* 로딩 */
.loading-overlay {
  display:none; position:fixed; inset:0; background:var(--overlay-bg);
  z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.loading-overlay.active { display:flex; }
.spinner {
  width:44px; height:44px; border:3px solid var(--spinner-track);
  border-top-color:var(--spinner-head); border-radius:50%;
  animation:spin 0.75s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(--text2); }
.loading-bar-wrap { width:240px; height:3px; background:var(--bar-bg); border-radius:2px; overflow:hidden; }
.loading-bar { height:100%; background:var(--bar-fg); border-radius:2px; transition:width 0.2s ease; width:0%; }

.debug-box {
  margin:10px 32px; padding:10px 14px;
  background:var(--log-bg); border:1px solid var(--border); border-radius:8px;
  font-size:11px; max-height:150px; overflow-y:auto; line-height:1.9;
}
.log-err { color:var(--pm-text); } .log-warn { color:var(--text3); }
.log-ok  { color:var(--ok-text); } .log-info { color:var(--text3); }
.log-muted { color:var(--text4); }

.summary {
  background:var(--summary-bg); display:flex; gap:8px; padding:14px 32px;
  border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center;
}
.summary-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
.chip {
  display:flex; flex-direction:column; align-items:center;
  padding:8px 16px; border-radius:8px; border:2px solid;
  cursor:pointer; background:transparent; gap:1px;
  min-width:60px; transition:all 0.12s; font-family:inherit;
}
.chip:hover { transform:translateY(-1px); }
.chip-label { font-size:10px; letter-spacing:1px; font-weight:600; }
.chip-count { font-size:20px; font-weight:700; }

.view-tabs {
  display:flex; border:1.5px solid var(--border);
  border-radius:7px; overflow:hidden; background:var(--input-bg);
}
.view-tab {
  padding:6px 14px; font-size:11px; cursor:pointer;
  background:transparent; border:none; color:var(--text3);
  font-family:inherit; transition:all 0.12s;
}
.view-tab.active { background:var(--surface); color:var(--text2); box-shadow:0 1px 4px rgba(0,0,0,0.1); }
.view-tab:hover:not(.active) { color:var(--text2); }

.grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px; padding:20px 32px;
}
.card {
  border-radius:9px; border:2px solid; padding:8px;
  display:flex; flex-direction:column; align-items:center;
  gap:4px; cursor:default; position:relative;
  transition:transform 0.12s,box-shadow 0.12s;
}
.card:hover { transform:translateY(-2px); }
.card-ok  { background:var(--ok-bg);  border-color:var(--ok-border); }
.card-no  { background:var(--no-bg);  border-color:var(--no-border);  box-shadow:0 2px 8px rgba(100,100,100,0.18); }
.card-em  { background:var(--em-bg);  border-color:var(--em-border);  box-shadow:0 2px 10px rgba(41,121,212,0.25); }
.card-pm  { background:var(--pm-bg);  border-color:var(--pm-border);  box-shadow:0 2px 10px rgba(212,50,50,0.25); }
.card-err { background:var(--err-bg); border-color:var(--err-border); box-shadow:0 2px 10px rgba(196,154,16,0.25); }
.card-load{ background:var(--input-bg); border-color:var(--border); }
.card-status { font-size:11px; font-weight:800; letter-spacing:2px; }
.card-id { font-size:14px; font-weight:700; color:var(--text2); }
.card-meta { font-size:12px; color:var(--text3); }
.card-err-text { font-size:12px; color:var(--err-text); text-align:center; word-break:break-all; }
.card:hover .tooltip { display:block; }
.tooltip {
  display:none; position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
  background:var(--tooltip-bg); border:1px solid var(--tooltip-border); border-radius:8px;
  padding:9px 12px; font-size:14px; white-space:nowrap; z-index:50;
  color:var(--tooltip-text); line-height:1.8; pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,0.14);
}

.list-toolbar { display:flex; align-items:center; gap:10px; padding:14px 32px 0; flex-wrap:wrap; }
.list-filter-sel {
  background:var(--input-bg); border:1.5px solid var(--border); border-radius:6px;
  color:var(--text2); padding:6px 10px; font-size:12px; outline:none; font-family:inherit; cursor:pointer;
}
.list-view { padding:14px 32px; }
.list-header {
  display:grid; grid-template-columns:130px 70px 1fr; padding:8px 14px;
  font-size:10px; letter-spacing:1px; text-transform:uppercase;
  color:var(--text3); background:var(--input-bg);
  border:1.5px solid var(--border); border-radius:8px 8px 0 0;
}
.list-body {
  border:1.5px solid var(--border); border-top:none;
  border-radius:0 0 8px 8px; overflow:hidden;
  max-height:520px; overflow-y:auto; background:var(--surface);
}
.list-row {
  display:grid; grid-template-columns:130px 70px 1fr;
  padding:8px 14px; font-size:12px;
  border-bottom:1px solid var(--border2); align-items:center; transition:background 0.08s;
}
.list-row:last-child { border-bottom:none; }
.list-row:hover { background:var(--input-bg); }
.list-id-cell { color:var(--text2); font-size:13px; font-weight:600; }
.list-status-cell { font-weight:800; font-size:11px; letter-spacing:1px; }
.list-time-cell { color:var(--text3); font-size:11px; }

.mode-tabs {
  display:flex; border:1.5px solid var(--border); border-radius:8px;
  overflow:hidden; background:var(--input-bg); width:fit-content;
}
.mode-tab {
  padding:7px 20px; font-size:12px; font-weight:500; cursor:pointer;
  background:transparent; border:none; color:var(--text3);
  font-family:inherit; transition:all 0.12s;
}
.mode-tab.active { background:var(--surface); color:var(--text); font-weight:600; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
.mode-tab:hover:not(.active) { color:var(--text2); }

/* 단일 검색 날짜 테이블 */
.single-detail-wrap { margin-top:14px; }
.single-detail-title { font-size:13px; font-weight:700; color:var(--text2); margin-bottom:8px; }
.single-detail-scroll { overflow-x:auto; border-radius:8px; border:1.5px solid var(--border); }
.single-detail-table {
  width:100%; border-collapse:collapse; font-size:12px;
  background:var(--surface); table-layout:fixed;
}
.single-detail-table colgroup col:nth-child(1) { width:44%; }
.single-detail-table colgroup col:nth-child(2),
.single-detail-table colgroup col:nth-child(3),
.single-detail-table colgroup col:nth-child(4) { width:18.67%; }
.single-detail-table th {
  background:var(--input-bg); color:var(--text3); font-size:10px;
  letter-spacing:0.5px; padding:8px 10px;
  border-bottom:1.5px solid var(--border); text-align:center; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.single-detail-table th:first-child { text-align:left; }
.single-detail-table td {
  padding:7px 10px; border-bottom:1px solid var(--border2);
  color:var(--text2); white-space:nowrap; text-align:center;
  overflow:hidden; text-overflow:ellipsis;
}
.single-detail-table td:first-child { text-align:left; font-size:11px; }
.single-detail-table tr:last-child td { border-bottom:none; }
.single-detail-table tr:hover td { background:var(--input-bg); }
.single-detail-empty { font-size:13px; color:var(--text4); padding:16px 0; }

/* 영역 지정 점검 */
.zone-header {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px;
}
.zone-search-input {
  background:var(--input-bg); border:1.5px solid var(--border); border-radius:7px;
  color:var(--text); padding:7px 12px; font-size:12px; outline:none;
  font-family:inherit; width:200px; transition:border-color 0.15s;
}
.zone-search-input:focus { border-color:var(--text3); }
.zone-search-input::placeholder { color:var(--text4); }
.btn-zone-toggle {
  background:transparent; color:var(--text3); border:1.5px solid var(--border);
  border-radius:7px; padding:6px 12px; font-size:12px; cursor:pointer;
  font-family:inherit; transition:all 0.12s; display:flex; align-items:center; gap:5px;
}
.btn-zone-toggle:hover { color:var(--text2); border-color:var(--text3); }
.zone-toggle-arrow { font-size:10px; display:inline-block; transition:transform 0.2s; }
.zone-toggle-arrow.open { transform:rotate(180deg); }
.zone-grid-wrap {
  overflow:hidden; transition:max-height 0.3s ease, opacity 0.2s ease;
  max-height:0; opacity:0;
}
.zone-grid-wrap.open { max-height:9999px; opacity:1; }
.zone-grid {
  display:flex; flex-wrap:wrap; gap:8px; padding-bottom:4px;
}
.zone-btn {
  display:flex; flex-direction:column; align-items:center;
  padding:8px 14px; border-radius:8px; border:1.5px solid var(--border);
  background:var(--input-bg); color:var(--text2);
  font-family:inherit; font-size:12px; font-weight:600;
  cursor:pointer; transition:all 0.12s; gap:2px; min-width:80px;
}
.zone-btn:hover { border-color:var(--text3); color:var(--text); }
.zone-btn.selected { border-color:var(--em-border); background:var(--em-chip-bg); color:var(--em-chip-text); }
.zone-btn.hidden { display:none; }
.zone-btn .zone-name { font-size:13px; font-weight:700; }
.zone-btn .zone-range { font-size:10px; opacity:0.7; }
.zone-btn .zone-location { font-size:10px; color:var(--text3); opacity:0.85; }
.zone-no-result { font-size:12px; color:var(--text4); padding:8px 0; }
.zone-select-row { display:flex; gap:8px; align-items:center; margin-top:8px; flex-wrap:wrap; }
.zone-select-count { font-size:11px; color:var(--text3); }
.btn-icon-sm {
  background:transparent; border:1.5px solid var(--border); border-radius:7px;
  padding:5px 10px; font-size:12px; color:var(--text3); cursor:pointer;
  font-family:inherit; transition:all 0.12s; display:none; align-items:center; gap:4px;
}
.btn-icon-sm:hover { color:var(--text2); border-color:var(--text3); }
.btn-icon-sm.visible { display:inline-flex; }

/* 영역 편집 (관리자) */
.zone-editor-section {
  margin-top:12px; padding:14px; background:var(--input-bg);
  border:1.5px solid var(--border); border-radius:8px;
}
.zone-editor-section .section-label { margin-bottom:10px; }
.zone-editor-input { width:160px; }
.zone-ids-input { width:300px; }
.zone-location-input { width:200px; }
.custom-zone-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.custom-zone-tag {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--tag-bg); border:1px solid var(--tag-border);
  border-radius:20px; padding:4px 10px 4px 12px; font-size:11px; color:var(--text2);
}
.custom-zone-tag button {
  background:none; border:none; color:var(--text4); cursor:pointer;
  font-size:14px; line-height:1; padding:0; transition:color 0.1s;
}
.custom-zone-tag button:hover { color:var(--pm-text); }

/* 설치 장소 편집 */
.location-editor-list { margin-top:10px; display:flex; flex-direction:column; gap:6px; max-height:300px; overflow-y:auto; }
.location-editor-row {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  padding:6px 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px;
}
.location-editor-zone-name { font-size:12px; font-weight:600; color:var(--text); min-width:180px; }
.location-editor-input {
  background:var(--input-bg); border:1.5px solid var(--border);
  border-radius:6px; color:var(--text); padding:5px 10px;
  font-size:12px; outline:none; font-family:inherit; flex:1; min-width:120px;
  transition:border-color 0.15s;
}
.location-editor-input:focus { border-color:var(--text3); }
.btn-save-loc {

<!--
================================================================================
 Google Apps Script 코드 — 아래 코드를 복사하여 GAS 프로젝트에 붙여넣고
 [배포 > 새 배포 > 웹앱] 으로 배포 후 URL을 아래 GAS_URL 변수에 입력하세요.
 액세스 권한: "모든 사용자"로 설정해야 합니다.

 시트 구조 가정:
   - 8행  : 날짜 헤더 (예: "04.27(일)") — D열부터 오른쪽으로 날짜 순
   - B열  : 제품 ID (9행부터)
   - C열  : 설치 장소 (9행부터, 참조용)
================================================================================

function doPost(e) {
  var data = JSON.parse(e.postData.contents);

  // 저장 요청 시각 기준으로 KST 날짜 산출
  var savedDate = data.savedAt ? new Date(data.savedAt) : new Date();
  var DAYS = ['일','월','화','수','목','금','토'];
  var month = Utilities.formatDate(savedDate, 'Asia/Seoul', 'MM');
  var day   = Utilities.formatDate(savedDate, 'Asia/Seoul', 'dd');
  var kstYMD = Utilities.formatDate(savedDate, 'Asia/Seoul', 'yyyy-MM-dd').split('-');
  var kstDate = new Date(parseInt(kstYMD[0]), parseInt(kstYMD[1]) - 1, parseInt(kstYMD[2]));
  var todayStr = month + '.' + day + '(' + DAYS[kstDate.getDay()] + ')';  // 예: "04.27(일)"

  // 시트명: "YYYY년 M월"
  var sheetName = kstYMD[0] + '년 ' + parseInt(kstYMD[1]) + '월';
  var ss    = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName(sheetName);
  if (!sheet) {
    return ContentService.createTextOutput(
      JSON.stringify({ success: false, error: '시트 없음: ' + sheetName })
    ).setMimeType(ContentService.MimeType.JSON);
  }

  // 8행에서 오늘 날짜와 일치하는 열 찾기
  var lastCol    = sheet.getLastColumn();
  var headerVals = sheet.getRange(8, 1, 1, lastCol).getValues()[0];
  var targetCol  = -1;
  for (var c = 0; c < headerVals.length; c++) {
    if (String(headerVals[c]).trim() === todayStr) {
      targetCol = c + 1;  // 1-based
      break;
    }
  }
  if (targetCol === -1) {
    return ContentService.createTextOutput(
      JSON.stringify({ success: false, error: '날짜 열 없음: ' + todayStr })
    ).setMimeType(ContentService.MimeType.JSON);
  }

  // B열에서 제품 ID 찾기 (9행부터)
  var lastRow = sheet.getLastRow();
  var idVals  = lastRow >= 9 ? sheet.getRange(9, 2, lastRow - 8, 1).getValues() : [];

  var updated = 0;
  data.results.forEach(function(r) {
    for (var i = 0; i < idVals.length; i++) {
      if (String(idVals[i][0]).trim() === String(r.id).trim()) {
        sheet.getRange(i + 9, targetCol).setValue(String(r.status).toUpperCase());
        updated++;
        break;
      }
    }
  });

  return ContentService.createTextOutput(
    JSON.stringify({ success: true, updated: updated, sheet: sheetName, col: todayStr })
  ).setMimeType(ContentService.MimeType.JSON);
}
================================================================================
-->

/* ===== GAS 저장 ===== */
async function saveToSheet(){
  if(!GAS_URL){
    alert('GAS_URL이 설정되지 않았습니다.\nindex.html 상단의 GAS_URL 변수에 배포된 Google Apps Script URL을 입력해주세요.');

  const btn=document.getElementById('saveSheetBtn');
  btn.disabled=true; btn.textContent='저장 중…';
  try {
    await fetch(GAS_URL,{
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({results:lastResults, savedAt:new Date().toISOString()})
    });
    btn.textContent='✓ 저장 완료';
    setTimeout(()=>{ btn.textContent='시트에 저장'; btn.disabled=false; },2500);
  } catch(e) {
    alert('저장 중 오류가 발생했습니다: '+e.message);
    btn.textContent='시트에 저장'; btn.disabled=false;
  }
}

/* ===== 날짜 ===== */
function todayStr(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function yesterdayStr(){
  const d=new Date(); d.setDate(d.getDate()-1);
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDateRange(mode){
  const today=todayStr(), yest=yesterdayStr();
  if(mode==='single'){
    const s=document.getElementById('singleStartDate').value||yest;
    const e=document.getElementById('singleEndDate').value||today;
    return{started_at:s, finished_at:e};
  }
  if(mode==='zone'){
    return{started_at:yest, finished_at:today};
  }
  // range: 2일 전 ~ 오늘
  const d=new Date(); d.setDate(d.getDate()-2);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return{started_at:fmt(d), finished_at:today};
}

function updateDateInfo(){
  const dr=getDateRange(currentMode);
  document.getElementById('dateInfo').textContent=`조회 기간  ${dr.started_at} ~ ${dr.finished_at}`;
}

/* ===== ID 입력 제한 ===== */
function restrictIdInput(e){
  const allowed=['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Enter'];
  if(allowed.includes(e.key))return;
  if(/^[a-zA-Z0-9]$/.test(e.key)){
    if(e.target.value.length>=4){e.preventDefault();return;}
    if(/^[a-z]$/.test(e.key)){
      e.preventDefault();
      const pos=e.target.selectionStart;
      e.target.value=e.target.value.slice(0,pos)+e.key.toUpperCase()+e.target.value.slice(e.target.selectionEnd);
      e.target.setSelectionRange(pos+1,pos+1);
    }
    return;
  }
  e.preventDefault();
}

/* ===== ID 유틸 ===== */
function parseId(id){
  const m=id.trim().toUpperCase().match(/^([A-Z]*)(\d+)$/);
  if(!m)return null;
  return{prefix:m[1],num:parseInt(m[2],10),padLen:m[2].length};
}
function formatId(prefix,num,padLen){return prefix+String(num).padStart(padLen,'0');}

/* ===== 시간/분류 ===== */
function parseFormatTime(str){
  if(!str)return null;
  const d=new Date(str.replace(/\./g,'-').replace(' ','T'));
  return isNaN(d.getTime())?null:d;
}
function classify(item,nowMs){
  if(!item)return'NO';
  const d=parseFormatTime(item.format_created_time);
  if(!d)return'NO';
  if((nowMs-d.getTime())/3600000>=2)return'NO';
  const{pm_2_5,pm_10,co2}=item;
  if(pm_2_5===0&&pm_10===0&&co2===0)return'EM';
  if(pm_2_5===0&&pm_10===0&&co2!==0)return'PM';
  return'OK';
}

/* ===== API ===== */
async function fetchReport(controllerId,dateRange,token){
  const p=new URLSearchParams({controller_id:controllerId,started_at:dateRange.started_at,finished_at:dateRange.finished_at,per_page:'100'});
  const res=await fetch(`${API}?${p}`,{headers:{Authorization:`Bearer ${token}`,Accept:'application/json'}});
  if(!res.ok){const body=await res.text().catch(()=>'');throw new Error(`HTTP ${res.status}: ${body.slice(0,80)}`);}
  const json=await res.json();
  const data=json.data;
  if(!Array.isArray(data)||data.length===0)return null;
  return data[0];
}

async function fetchAllReports(controllerId,dateRange,token){
  const p=new URLSearchParams({controller_id:controllerId,started_at:dateRange.started_at,finished_at:dateRange.finished_at,per_page:'200'});
  const res=await fetch(`${API}?${p}`,{headers:{Authorization:`Bearer ${token}`,Accept:'application/json'}});
  if(!res.ok){const body=await res.text().catch(()=>'');throw new Error(`HTTP ${res.status}: ${body.slice(0,80)}`);}
  const json=await res.json();
  return Array.isArray(json.data)?json.data:[];
}

    return`<div class="list-row">
      <div class="list-id-cell">${escHtml(r.id)}</div>
      <div class="list-status-cell" style="color:var(${cfg.textVar})">${cfg.label}</div>
      <div class="list-time-cell">${escHtml(time||'—')}</div>
    </div>`;
  }).join('');
}
function copyListToClipboard(){
  const sel=document.getElementById('listFilterSel').value;
  const filtered=sel==='ALL'?results:results.filter(r=>r.status===sel);
  navigator.clipboard.writeText(filtered.map(r=>`${r.id}\t${r.status}`).join('\n')).then(()=>{
    const msg=document.getElementById('copyMsg');
    msg.style.display='inline';
    setTimeout(()=>{msg.style.display='none';},2000);
  });
}
function switchView(v){
  currentView=v;
  document.getElementById('grid').style.display       =v==='grid'?'grid':'none';
  document.getElementById('listView').style.display   =v==='list'?'block':'none';
  document.getElementById('listToolbar').style.display=v==='list'?'flex':'none';
  renderSummary(); if(v==='list')renderList();
}
function setFilter(f){currentFilter=f;renderSummary();renderGrid();}

/* ===== 단일 검색 결과 렌더 ===== */
function fmtTime(str){
  if(!str) return '—';
  // "2026.04.26 05:07:00" → "04.26 05:07"
  const m=str.match(/\d{4}[.\-](\d{2})[.\-](\d{2})\s+(\d{2}:\d{2})/);
  return m?`${m[1]}.${m[2]} ${m[3]}`:str.slice(5,16);
}

function renderSingleDetail(id, items){
  const section=document.getElementById('singleResultSection');
  const title=document.getElementById('singleDetailTitle');
  const body=document.getElementById('singleDetailBody');
  title.textContent=`${id} — ${items.length}건`;
  if(!items.length){
    body.innerHTML=`<tr><td colspan="4" class="single-detail-empty" style="text-align:center">조회된 데이터가 없습니다</td></tr>`;
    section.style.display='block'; return;
  }
  body.innerHTML=items.map(item=>`<tr>
    <td>${escHtml(fmtTime(item.format_created_time))}</td>
    <td>${item.pm_10!==undefined?item.pm_10:'—'}</td>
    <td>${item.pm_2_5!==undefined?item.pm_2_5:'—'}</td>
    <td>${item.co2!==undefined?item.co2:'—'}</td>
  </tr>`).join('');
  section.style.display='block';
}

/* ===== 공통 실행 ===== */
async function runInspection(allIds){
  const token=document.getElementById('tokenInput').value.trim();
  if(!token){document.getElementById('errorMsg').textContent='⚠ 토큰이 설정되지 않았습니다.';return;}
  document.getElementById('runBtn').disabled=true;
  document.getElementById('summary').style.display='none';
  document.getElementById('grid').innerHTML=''; document.getElementById('listBody').innerHTML='';
  currentFilter='ALL'; currentView='grid';
  const dateRange=getDateRange(currentMode),nowMs=Date.now(),total=allIds.length;
  setLoading(true,0,total);
  addLog(`총 ${total}개 전체 동시 요청 시작`,'info');
  addLog(`기간: ${dateRange.started_at} ~ ${dateRange.finished_at}`,'muted');
  const out=allIds.map(id=>({id,status:'LOAD',item:null,errMsg:''}));
  let done=0;
  await Promise.all(allIds.map(async(id,idx)=>{
    try{
      const item=await fetchReport(id,dateRange,token);
      const status=classify(item,nowMs);
      out[idx]={id,status,item,errMsg:''};
      addLog(`[${id}] ${status}`+(item?` | ${item.format_created_time}`:'  | 데이터 없음'),status==='OK'?'ok':status==='ERR'?'err':'warn');
    }catch(err){
      out[idx]={id,status:'ERR',item:null,errMsg:err.message};
      addLog(`[${id}] ERR → ${err.message}`,'err');
    }
    setLoading(true,++done,total);
  }));
  results=out; lastResults=out; setLoading(false);
  document.getElementById('summary').style.display='flex';
  document.getElementById('grid').style.display='grid';
  document.getElementById('listView').style.display='none';
  document.getElementById('listToolbar').style.display='none';
  document.body.classList.remove('zone-active');
  if(zoneGridOpen) toggleZoneGrid();
  renderSummary(); renderGrid();
  addLog('✓ 점검 완료','ok');
  document.getElementById('runBtn').disabled=false;
  document.getElementById('logBtn').style.display='inline-block';
  if(adminAuthenticated && currentMode==='range') updateSheetBtn();
  if(logVisible)renderLog();
}

/* ===== 메인 진입 ===== */
async function startInspection(){
  const errEl=document.getElementById('errorMsg');
  errEl.textContent=''; logs=[];
  const token=document.getElementById('tokenInput').value.trim();

  /* 단일 검색 */
  if(currentMode==='single'){
    const raw=document.getElementById('singleIdInput').value.trim();
    if(!raw){errEl.textContent='⚠ 제품 ID를 입력해주세요.';return;}
    const dateRange=getDateRange('single');
    document.getElementById('runBtn').disabled=true;
    setLoading(true);
    try{
      const items=await fetchAllReports(raw,dateRange,token);
      renderSingleDetail(raw,items);
    }catch(e){
      errEl.textContent='⚠ 오류: '+e.message;
    }finally{
      setLoading(false);
      document.getElementById('runBtn').disabled=false;
    }
    return;
  }

  /* 영역 점검 */
  if(currentMode==='zone'){
    if(selectedZones.size===0){errEl.textContent='⚠ 영역을 하나 이상 선택해주세요.';return;}
    const ZONES=getAllZones();
    const zoneIds=[];
    selectedZones.forEach(i=>{ if(ZONES[i]) zoneIds.push(...ZONES[i].ids); });
    await runInspection([...new Set(zoneIds)]);
    return;
  }

  /* 범위/개별 */
  const startIdRaw=document.getElementById('startIdInput').value.trim()||'A001';
  const endIdRaw=document.getElementById('endIdInput').value.trim();
  let rangeIds=[];
  if(endIdRaw){
    const s=parseId(startIdRaw),e=parseId(endIdRaw);
    if(!s||!e){errEl.textContent='⚠ ID 형식이 잘못되었습니다. 예: A001';return;}
    if(s.prefix!==e.prefix){errEl.textContent='⚠ 시작/끝 ID 접두사가 같아야 합니다.';return;}
    if(s.num>e.num){errEl.textContent='⚠ 끝 ID가 시작 ID보다 작습니다.';return;}
    const padLen=Math.max(s.padLen,e.padLen);
    for(let n=s.num;n<=e.num;n++)rangeIds.push(formatId(s.prefix,n,padLen));
    lsSet(LS_ENDID,endIdRaw);
  }
  const allIds=[...new Set([...rangeIds,...extraIds])];
  if(allIds.length===0){errEl.textContent='⚠ 점검할 ID가 없습니다.';return;}
  await runInspection(allIds);
}

  document.getElementById('singleStartDate').value=yesterdayStr();
  document.getElementById('singleEndDate').value=todayStr();

  extraIds=lsGet(LS_EXTRA,[]);
  const savedEnd=lsGet(LS_ENDID,'');
  if(savedEnd) document.getElementById('endIdInput').value=savedEnd;
  renderExtraTags();

  const savedMode=lsGet(LS_MODE,'range');
  switchMode(savedMode);
  updateDateInfo();

  const addRestrictedInput=(id)=>{
    const el=document.getElementById(id);
    el.addEventListener('keydown',e=>{if(e.key==='Enter'){startInspection();return;}restrictIdInput(e);});
    el.addEventListener('paste',e=>{
      e.preventDefault();
      const cleaned=(e.clipboardData||window.clipboardData).getData('text').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);
      el.value=cleaned;
    });
  };
  addRestrictedInput('startIdInput');
  addRestrictedInput('endIdInput');

  document.getElementById('extraIdInput').addEventListener('keydown',e=>{if(e.key==='Enter')addExtraId();});
  document.getElementById('singleIdInput').addEventListener('keydown',e=>{if(e.key==='Enter')startInspection();});
  document.getElementById('adminPwInput').addEventListener('keydown',e=>{if(e.key==='Enter')authenticateAdmin();});
  document.getElementById('productLocName').addEventListener('keydown',e=>{if(e.key==='Enter')addProductLocation();});

  // 단일 검색 날짜 변경 시 dateInfo 업데이트
  document.getElementById('singleStartDate').addEventListener('change',updateDateInfo);
  document.getElementById('singleEndDate').addEventListener('change',updateDateInfo);
})();
</script>
